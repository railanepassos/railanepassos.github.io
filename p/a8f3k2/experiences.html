<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lista pessoal de lugares para visitar.">
    <meta name="author" content="Railane Passos">
    <meta name="robots" content="noindex, nofollow">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; img-src 'self' https: data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; script-src 'none'; upgrade-insecure-requests">
    <link rel="stylesheet" href="/styles.css">
    <title>Experiências</title>
</head>
<body class="page-bucket">
    <div class="page-shell">
        <header class="site-header">
            <div class="site-header__inner">
                <span class="logo" aria-hidden="true">
                    <span class="logo__name">Workflow <span class="logo__accent">Tech Engineering</span></span>
                </span>
            </div>
        </header>

        <main class="page-main">
            <div class="container container--narrow">
                <article class="bucket-card">
                    <h1 class="bucket-title">Experiências</h1>
                    <p class="bucket-description">
                        Lugares que quero conhecer. Links externos abrem em nova aba ao clicar.
                    </p>

                    <!--
                    Template — copie o bloco abaixo para adicionar um lugar:

                    <a href="URL_AQUI"
                       class="link-card"
                       rel="noopener noreferrer"
                       target="_blank">
                      <img src="/assets/icons/instagram.svg" alt="" width="24" height="24">
                      <span class="link-card__text">
                        <span class="link-card__label">NOME DO LUGAR</span>
                        <span class="link-card__desc">CIDADE, UF — nota opcional</span>
                      </span>
                    </a>

                    Ícones disponíveis em /assets/icons/ (instagram.svg, external-link.svg, etc.).
                    -->

                    <nav class="bucket-list" aria-label="Lugares para visitar">
                        <a href="https://www.instagram.com/museudomar.aleixobelov/"
                           class="link-card"
                           rel="noopener noreferrer"
                           target="_blank">
                            <img src="/assets/icons/instagram.svg" alt="" width="24" height="24">
                            <span class="link-card__text">
                                <span class="link-card__label">Museu do Mar</span>
                                <span class="link-card__desc">Aleixobelov, AL</span>
                            </span>
                        </a>
                    </nav>
                </article>
            </div>
        </main>

        <footer class="site-footer">
            <p>&copy; 2026 Workflow Tech Engineering</p>
        </footer>
    </div>
</body>
</html>
